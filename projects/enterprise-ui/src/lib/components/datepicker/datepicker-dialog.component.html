<div
  cdkTrapFocus
  [cdkTrapFocusAutoCapture]="false"
  [id]="dialogId()"
  class="datepicker-calendar"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="dialogTitleId()"
  [attr.data-testid]="testIdFor('dialog')"
>
  <h2
    [id]="dialogTitleId()"
    class="cdk-visually-hidden"
    [attr.data-testid]="testIdFor('dialog-title')"
  >
    {{ dialogTitle() }}
  </h2>

  <div
    [id]="dialogDescriptionId()"
    class="cdk-visually-hidden"
    role="status"
    aria-live="polite"
    aria-atomic="true"
    [attr.data-testid]="testIdFor('dialog-description')"
  >
    {{ navigationAnnouncement() }}
  </div>

  <datepicker-header
    [context]="headerContext()"
    (previousMonth)="previousMonth.emit()"
    (nextMonth)="nextMonth.emit()"
    (previousYear)="previousYear.emit()"
    (nextYear)="nextYear.emit()"
    (monthSelected)="monthSelected.emit($event)"
    (yearSelected)="yearSelected.emit($event)"
  />

  <datepicker-grid
    [attr.id]="idFor('grid-component')"
    [context]="gridContext()"
    [attr.data-testid]="testIdFor('grid-component')"
    (dateSelected)="dateSelected.emit($event)"
    (dateFocused)="dateFocused.emit($event)"
    (dateKeydown)="dateKeydown.emit($event)"
  />

  <div
    [id]="idFor('date-status')"
    class="cdk-visually-hidden"
    role="status"
    aria-live="polite"
    aria-atomic="true"
    [attr.data-testid]="testIdFor('date-status')"
  >
    {{ dateAnnouncement() }}
  </div>

  @if (!dateOnly()) {
    <time-picker
      [context]="context()"
      (timeChanged)="timeChanged.emit($event)"
      (timeAdjusted)="timeAdjusted.emit($event)"
    />
  }
</div>
