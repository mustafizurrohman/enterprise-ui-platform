<div
  class="datepicker-time-wheel"
  role="group"
  [attr.aria-labelledby]="labelId()"
  [attr.data-testid]="testIdFor('wheel')"
>
  <button
    type="button"
    class="datepicker-time-button"
    [class.datepicker-time-button--pressed]="pressedDirection() === 'increment'"
    [attr.aria-controls]="controlId()"
    [attr.aria-label]="configuration().singularLabel + ' um eins erhöhen'"
    [attr.data-testid]="testIdFor('increment')"
    (pointerdown)="startPress($event, 1, 'increment')"
    (pointerup)="stopPress($event)"
    (pointercancel)="stopPress($event)"
    (pointerleave)="stopPress($event)"
    (click)="onButtonClick($event, 1, 'increment')"
  >
    <mat-icon
      aria-hidden="true"
      [attr.data-testid]="testIdFor('increment-icon')"
    >
      keyboard_arrow_up
    </mat-icon>
  </button>

  <div
    class="datepicker-time-value"
    [attr.data-animation]="animationName()"
    [attr.data-testid]="testIdFor('value')"
  >
    <span
      class="datepicker-time-preview"
      aria-hidden="true"
      [attr.data-testid]="testIdFor('next-value')"
    >
      {{ nextValue() }}
    </span>

    <input
      #timeInput
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="2"
      role="spinbutton"
      autocomplete="off"
      spellcheck="false"
      aria-keyshortcuts="ArrowUp ArrowDown PageUp PageDown Home End"
      [id]="controlId()"
      class="datepicker-time-select"
      [attr.aria-labelledby]="labelId()"
      [attr.aria-valuemin]="0"
      [attr.aria-valuemax]="configuration().maximum"
      [attr.aria-valuenow]="value()"
      [attr.aria-valuetext]="
        formatValue(value()) + ' ' + configuration().valueTextSuffix
      "
      [attr.data-testid]="testIdFor('input')"
      [value]="formatValue(value())"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
      (change)="commit(timeInput.value)"
    />

    <span
      class="datepicker-time-preview"
      aria-hidden="true"
      [attr.data-testid]="testIdFor('previous-value')"
    >
      {{ previousValue() }}
    </span>
  </div>

  <button
    type="button"
    class="datepicker-time-button"
    [class.datepicker-time-button--pressed]="pressedDirection() === 'decrement'"
    [attr.aria-controls]="controlId()"
    [attr.aria-label]="configuration().singularLabel + ' um eins verringern'"
    [attr.data-testid]="testIdFor('decrement')"
    (pointerdown)="startPress($event, -1, 'decrement')"
    (pointerup)="stopPress($event)"
    (pointercancel)="stopPress($event)"
    (pointerleave)="stopPress($event)"
    (click)="onButtonClick($event, -1, 'decrement')"
  >
    <mat-icon
      aria-hidden="true"
      [attr.data-testid]="testIdFor('decrement-icon')"
    >
      keyboard_arrow_down
    </mat-icon>
  </button>

  <span
    [id]="labelId()"
    class="datepicker-time-label"
    [attr.data-testid]="testIdFor('label')"
  >
    {{ configuration().label }}
  </span>
</div>
