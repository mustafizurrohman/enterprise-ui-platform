<div
  [id]="wheelId()"
  class="datepicker-time-wheel"
  role="group"
  [attr.aria-labelledby]="labelId()"
  [attr.data-testid]="testIdFor('wheel')"
>
  <button
    [id]="decrementButtonId()"
    type="button"
    class="datepicker-time-button"
    [attr.aria-controls]="controlId()"
    [attr.aria-label]="configuration().singularLabel + ' um eins verringern'"
    [attr.data-testid]="testIdFor('decrement')"
    (click)="decrement()"
  >
    <mat-icon
      aria-hidden="true"
      [attr.data-testid]="testIdFor('decrement-icon')"
    >
      remove
    </mat-icon>
  </button>

  <div
    [id]="valueId()"
    class="datepicker-time-value"
    [class.datepicker-time-value--rapid]="isRapidChange()"
    [attr.data-animation]="animationName()"
    [attr.data-testid]="testIdFor('value')"
  >
    <input
      #timeInput
      [id]="controlId()"
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="2"
      role="spinbutton"
      autocomplete="off"
      spellcheck="false"
      aria-keyshortcuts="ArrowUp ArrowDown PageUp PageDown Home End"
      class="datepicker-time-select"
      [attr.aria-labelledby]="labelId()"
      [attr.aria-describedby]="descriptionId()"
      [attr.aria-valuemin]="0"
      [attr.aria-valuemax]="configuration().maximum"
      [attr.aria-valuenow]="value()"
      [attr.aria-valuetext]="
        formatValue(value()) + ' ' + configuration().valueTextSuffix
      "
      [attr.data-testid]="testIdFor('input')"
      [value]="formatValue(value())"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
      (change)="commit(timeInput.value)"
    />
  </div>

  <button
    [id]="incrementButtonId()"
    type="button"
    class="datepicker-time-button"
    [attr.aria-controls]="controlId()"
    [attr.aria-label]="configuration().singularLabel + ' um eins erhöhen'"
    [attr.data-testid]="testIdFor('increment')"
    (click)="increment()"
  >
    <mat-icon
      aria-hidden="true"
      [attr.data-testid]="testIdFor('increment-icon')"
    >
      add
    </mat-icon>
  </button>

  <span
    [id]="labelId()"
    class="datepicker-time-label"
    [attr.data-testid]="testIdFor('label')"
  >
    {{ configuration().label }}
  </span>
</div>
