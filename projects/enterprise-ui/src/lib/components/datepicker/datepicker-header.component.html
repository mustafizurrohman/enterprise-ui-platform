<div
  [id]="idFor('header')"
  class="datepicker-header"
  [attr.data-testid]="testIdFor('header')"
>
  <div
    [id]="idFor('month-navigation')"
    class="datepicker-navigation-group datepicker-navigation-group--month"
    role="group"
    aria-label="Monatsnavigation"
    [attr.data-testid]="testIdFor('month-navigation')"
  >
    <div
      [id]="idFor('month-navigation-controls')"
      class="datepicker-navigation-controls"
      [attr.data-testid]="testIdFor('month-navigation-controls')"
    >
      <button
        [id]="idFor('previous-month')"
        type="button"
        class="datepicker-navigation"
        aria-label="Vorherigen Monat anzeigen"
        aria-keyshortcuts="PageUp"
        [attr.aria-controls]="context().calendarGridId"
        [attr.data-testid]="testIdFor('previous-month')"
        (repeatClick)="previousMonth.emit()"
      >
        <mat-icon aria-hidden="true" [attr.data-testid]="testIdFor('previous-month-icon')">chevron_left</mat-icon>
      </button>

      <div
        [id]="idFor('month-period-control')"
        class="datepicker-period-control datepicker-period-control--month"
        [attr.data-testid]="testIdFor('month-period-control')"
      >
        <select
          [id]="idFor('month-select')"
          class="datepicker-month-select"
          [value]="context().selectedMonth"
          aria-label="Monat auswählen"
          [attr.aria-controls]="context().calendarGridId"
          [attr.data-testid]="testIdFor('month-select')"
          (change)="onMonthChange($event)"
          (blur)="isMonthSelectFocused.set(false)"
          (mousedown)="isMonthSelectFocused.set(true)"
          (keydown.enter)="isMonthSelectFocused.set(true)"
          (keydown.space)="isMonthSelectFocused.set(true)"
          (keydown.alt.arrowdown)="isMonthSelectFocused.set(true)"
        >
          @for (month of context().shortMonths; track $index) {
            <option
              [id]="idFor('month-option-' + ($index + 1))"
              [value]="($index + 1).toString()"
              [selected]="($index + 1).toString() === context().selectedMonth"
              [attr.data-testid]="testIdFor('month-option-' + ($index + 1))"
            >
              {{ month
              }}{{
                isMonthSelectFocused()
                  ? " (" + ($index + 1 < 10 ? "0" : "") + ($index + 1) + ")"
                  : ""
              }}
            </option>
          }
        </select>

        <button
          [id]="idFor('month-reset')"
          type="button"
          class="datepicker-navigation-reset"
          aria-label="Zum aktuellen Monat springen"
          title="Aktueller Monat"
          [attr.aria-controls]="context().calendarGridId"
          [attr.data-testid]="testIdFor('month-reset')"
          (click)="monthSelected.emit(context().todayMonth)"
        >
          <mat-icon aria-hidden="true" [attr.data-testid]="testIdFor('month-reset-icon')">calendar_month</mat-icon>
        </button>
      </div>

      <button
        [id]="idFor('next-month')"
        type="button"
        class="datepicker-navigation"
        aria-label="Nächsten Monat anzeigen"
        aria-keyshortcuts="PageDown"
        [attr.aria-controls]="context().calendarGridId"
        [attr.data-testid]="testIdFor('next-month')"
        (repeatClick)="nextMonth.emit()"
      >
        <mat-icon aria-hidden="true" [attr.data-testid]="testIdFor('next-month-icon')">chevron_right</mat-icon>
      </button>
    </div>
  </div>

  <span class="datepicker-navigation-divider" aria-hidden="true"></span>

  <div
    [id]="idFor('year-navigation')"
    class="datepicker-navigation-group datepicker-navigation-group--year"
    role="group"
    aria-label="Jahresnavigation"
    [attr.data-testid]="testIdFor('year-navigation')"
  >
    <div
      [id]="idFor('year-navigation-controls')"
      class="datepicker-navigation-controls"
      [attr.data-testid]="testIdFor('year-navigation-controls')"
    >
      <button
        [id]="idFor('previous-year')"
        type="button"
        class="datepicker-navigation"
        aria-label="Vorheriges Jahr anzeigen"
        aria-keyshortcuts="Shift+PageUp"
        [attr.aria-controls]="context().calendarGridId"
        [attr.data-testid]="testIdFor('previous-year')"
        (repeatClick)="previousYear.emit()"
      >
        <mat-icon aria-hidden="true" [attr.data-testid]="testIdFor('previous-year-icon')">keyboard_double_arrow_left</mat-icon>
      </button>

      <div
        [id]="idFor('year-period-control')"
        class="datepicker-period-control datepicker-period-control--year"
        [attr.data-testid]="testIdFor('year-period-control')"
      >
        <mat-form-field
          class="datepicker-year-field"
          subscriptSizing="dynamic"
        >
          <input
            [id]="idFor('year-input')"
            matInput
            type="text"
            inputmode="numeric"
            autocomplete="off"
            maxlength="4"
            pattern="[0-9]{4}"
            aria-keyshortcuts="Enter"
            aria-label="Vierstellige Jahreszahl eingeben"
            [attr.aria-controls]="context().calendarGridId"
            [formControl]="yearControl"
            [attr.data-testid]="testIdFor('year-display')"
            (input)="onYearInput($event)"
            (blur)="onYearBlur()"
            (keydown.enter)="onYearEnter($event)"
          />
        </mat-form-field>

        <button
          [id]="idFor('year-reset')"
          type="button"
          class="datepicker-navigation-reset"
          aria-label="Zum aktuellen Jahr springen"
          title="Aktuelles Jahr"
          [attr.aria-controls]="context().calendarGridId"
          [attr.data-testid]="testIdFor('year-reset')"
          (click)="yearSelected.emit(context().todayYear)"
        >
          <mat-icon aria-hidden="true" [attr.data-testid]="testIdFor('year-reset-icon')">date_range</mat-icon>
        </button>
      </div>

      <button
        [id]="idFor('next-year')"
        type="button"
        class="datepicker-navigation"
        aria-label="Nächstes Jahr anzeigen"
        aria-keyshortcuts="Shift+PageDown"
        [attr.aria-controls]="context().calendarGridId"
        [attr.data-testid]="testIdFor('next-year')"
        (repeatClick)="nextYear.emit()"
      >
        <mat-icon aria-hidden="true" [attr.data-testid]="testIdFor('next-year-icon')">keyboard_double_arrow_right</mat-icon>
      </button>
    </div>
  </div>

  <span
    [id]="context().monthHeadingId"
    class="cdk-visually-hidden"
    role="status"
    aria-live="polite"
    aria-atomic="true"
    [attr.data-testid]="testIdFor('month-heading')"
  >
    {{ context().formattedMonth }}
  </span>
</div>
